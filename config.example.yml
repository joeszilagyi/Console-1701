server:
  host: "127.0.0.1"
  port: 1701
  browser_refresh_seconds: 60

scan:
  interval_minutes: 30
  max_repos_per_scan: 75
  overall_scan_timeout_seconds: 180
  per_repo_timeout_seconds: 20
  git_command_timeout_seconds: 5
  log_tail_max_bytes: 262144
  max_recent_commits: 8
  max_changed_files_display: 80
  dirty_stale_hours: 24
  inactive_days_warning: 14
  inactive_days_stale: 45
  allow_network: false
  allow_git_fetch: false

sqlite:
  busy_timeout_ms: 5000
  journal_mode: "WAL"

paths:
  repo_roots:
    - "~/projects"
    - "~/wiki"
  explicit_repos:
    - "~/projects/console-1701/main"
    - "~/projects/ufo-records"
    - "~/projects/TCL"
    - "~/wiki"

ignore:
  paths:
    - "**/.git/**"
    - "**/.venv/**"
    - "**/venv/**"
    - "**/node_modules/**"
    - "**/__pycache__/**"
    - "**/.pytest_cache/**"
    - "**/.mypy_cache/**"
    - "**/.ruff_cache/**"
    - "**/dist/**"
    - "**/build/**"
    - "**/vendor/**"
    - "**/archive/**"

logs:
  - name: "ufo-actions"
    path: "~/wiki/ufo-actions.log"
    type: "ufo_actions"
    enabled: true
  - name: "codex"
    path: "~/.codex"
    type: "codex"
    enabled: true

test_policy:
  auto_run: true
  default_timeout_seconds: 120
  allow_repos:
    - "console-1701"
    - "~/projects/console-1701/main"

system_probe:
  command_timeout_seconds: 3
  allow_external_connectivity_checks: false
  external_check_urls:
    - "https://www.debian.org/"
  external_check_timeout_seconds: 3
  show_sensitive_identifiers: false
  critical_services: []

local:
  enabled: false
  default_place_label: "Seattle"
  include_airport: true
  include_port: true
  include_king_county_transit: true
  include_wsdot_seattle_corridors: true
  include_ferries: true
  hazard_radius_miles: 75
  earthquake_min_magnitude: 3.0
  allow_neighborhood_blogs: false
  allow_social_sources: false

news:
  enabled: false
  retention:
    items_days: 7
    fetch_runs_days: 14
    source_health_days: 30
    raw_payload_debug_enabled: false
    raw_payload_debug_ttl_hours: 6
  fetch_policy:
    global_concurrency: 2
    default_timeout_seconds: 10
    default_interval_minutes: 30
    default_backoff_minutes: 120
    max_response_bytes: 1048576
    user_agent: "console-1701 local recent-signal monitor"
    page_load_external_fetches: false
    respect_robots_txt: true
    allow_homepage_extractors: false
  scopes:
    LOCAL:
      enabled: false
      label: "Seattle"
      sources:
        - id: "seattle_open_data_example"
          name: "Seattle Open Data example"
          scope: "LOCAL"
          kind: "open_data_json"
          enabled: false
          url: "https://data.seattle.gov/resource/example.json"
          homepage_url: "https://data.seattle.gov/"
          robots_url: "https://data.seattle.gov/robots.txt"
          interval_minutes: 60
          timeout_seconds: 10
          retention_days: 7
          tags: ["official", "local"]
          priority: 70
          parser: "socrata_json"
          source_family: "seattle_open_data"
          source_class: "official_open_data"
          adapter: "socrata_json"
          privacy_risk: "medium"
          policy_risk: "low"
          parser_risk: "low"
          retention_sensitivity: "medium"
          verification_status: "candidate_needs_verification"
          evidence_notes:
            - "Disabled example only. Do not enable without choosing a real dataset."
        - id: "local_file_fixture_example"
          name: "Local fixture example"
          scope: "LOCAL"
          kind: "local_file_json"
          enabled: false
          url: "file://./tests/fixtures/news/local_items.json"
          interval_minutes: 0
          retention_days: 3
          tags: ["fixture"]
          priority: 10
          parser: "generic_json_items"
          source_family: "fixture"
          source_class: "source_health_only"
          adapter: "generic_json_items"
          privacy_risk: "low"
          policy_risk: "low"
          parser_risk: "low"
          retention_sensitivity: "low"
          verification_status: "user_seeded"
          evidence_notes:
            - "Disabled local fixture shape for future parser tests."
    REGIONAL:
      enabled: false
      label: "Washington / PNW"
      sources: []
    NATIONAL:
      enabled: false
      label: "United States"
      sources:
        - id: "national_rss_example"
          name: "National RSS example"
          scope: "NATIONAL"
          kind: "rss"
          enabled: false
          url: "https://example.invalid/feed.xml"
          interval_minutes: 60
          timeout_seconds: 10
          retention_days: 7
          tags: ["news"]
          priority: 30
          parser: "rss"
          evidence_notes:
            - "Disabled example only. Replace with a verified RSS/Atom feed before enabling."
    GLOBAL:
      enabled: false
      label: "World"
      sources: []
    ORBITAL:
      enabled: false
      label: "Orbital"
      sources:
        - id: "nasa_api_example"
          name: "NASA API example"
          scope: "ORBITAL"
          kind: "api_json"
          enabled: false
          url: "https://api.nasa.gov/example"
          homepage_url: "https://api.nasa.gov/"
          interval_minutes: 120
          timeout_seconds: 10
          retention_days: 7
          tags: ["official", "orbital"]
          priority: 50
          parser: "api_json"
          evidence_notes:
            - "Disabled example only. Do not enable without endpoint and key-policy review."

projects:
  - name: "console-1701"
    path: "~/projects/console-1701/main"
    role: "Local-only repo and workflow console"
    category: "Operational dashboard"
    importance: "critical"
    test_commands:
      - "./.venv/bin/pytest"
  - name: "ufo-records"
    path: "~/projects/ufo-records"
    role: "Long-horizon UFO research database and tooling"
    category: "Research machinery"
    importance: "high"
    test_commands:
      - "python3 -m pytest tools/sqlite/tests"
  - name: "TCL"
    path: "~/projects/TCL"
    role: "Time travel constraints library and adversarial theory project"
    category: "Theory/library project"
    importance: "high"
    test_commands: []
  - name: "wiki"
    path: "~/wiki"
    role: "Working area for prompts, article drafts, logs, country runs, and source machinery"
    category: "Research workbench"
    importance: "critical"
    test_commands: []
